<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 감정일기</title>
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --bg-color: #f8fafc;
      --card-bg: rgba(255, 255, 255, 0.85);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text-main);
    }

    .diary-container {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      width: 100%;
      max-width: 600px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.4);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .title-section {
      text-align: center;
      margin-bottom: 32px;
    }

    .title-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
      display: inline-block;
      animation: gentle-bounce 3s infinite ease-in-out;
    }

    @keyframes gentle-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .date-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }

    .input-section {
      margin-bottom: 28px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 20px;
      border-radius: 16px;
      border: 1px solid var(--border-color);
      background: #ffffff;
      font-family: inherit;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-main);
      resize: vertical;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    textarea::placeholder {
      color: #94a3b8;
    }

    .voice-btn-wrap {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .voice-subtitle {
      font-size: 1.05rem;
      font-weight: 700;
      color: #334155;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .voice-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 99px;
      border: none;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .voice-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }

    .voice-btn:active {
      transform: translateY(0);
    }

    .ai-response-box {
      background-color: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      min-height: 100px;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text-muted);
      position: relative;
    }

    .ai-response-box::before {
      content: 'AI Answer';
      position: absolute;
      top: -10px;
      left: 20px;
      background: linear-gradient(to right, #3b82f6, #06b6d4);
      color: white;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 8px;
      letter-spacing: 0.05em;
    }

    .pulse-animation {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--primary);
      animation: pulse 1.5s infinite;
      margin-left: 2px;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
      100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
    }

    .submit-btn-wrap {
      text-align: center;
      margin: 24px 0;
    }

    .submit-btn {
      background: linear-gradient(135deg, #f43f5e 0%, #fb923c 100%);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 99px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(244, 63, 94, 0.25);
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(244, 63, 94, 0.35);
    }
    
    .submit-btn:active {
      transform: translateY(1px);
    }

    .submit-btn:disabled {
      background: #cbd5e1;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
  </style>
</head>
<body>
  <div class="diary-container">
    
    <div class="title-section">
      <span class="title-icon">📝</span>
      <h1>오늘의 하루는 어땟나요?</h1>
      <div class="date-text" id="currentDate"></div>
    </div>

    <div class="input-section">
      <textarea id="diaryInput" placeholder="오늘 있었던 일, 느꼈던 감정들을 자유롭게 적어보세요..."></textarea>
    </div>

    <div class="voice-btn-wrap">
      <h3 class="voice-subtitle">
        <span style="font-size: 1.2rem;">🎙️</span> 음성으로 입력하기
      </h3>
      <div style="display: flex; gap: 10px;">
        <button class="voice-btn" id="voiceBtn" type="button">
          음성으로 입력하기
        </button>
        <button class="submit-btn" id="submitBtn" type="button" style="margin: 0; padding: 10px 18px; font-size: 0.95rem;">
          ✨ 분석 요청하기
        </button>
      </div>
    </div>

    <div class="ai-response-box" id="aiResponseBox">
      여기에 AI의 답변이 표시됩니다.
    </div>

  </div>

  <script>
    // 오늘의 날짜 표시
    const dateElement = document.getElementById('currentDate');
    const today = new Date();
    const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
    dateElement.textContent = today.toLocaleDateString('ko-KR', options);

    // 음성 인식 (Web Speech API) 설정
    const voiceBtn = document.getElementById('voiceBtn');
    const diaryInput = document.getElementById('diaryInput');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecognizing = false;
    let finalTranscript = '';

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true; // 끊기지 않고 계속 인식
      recognition.interimResults = true; // 말하는 도중의 중간 결과도 표시
      recognition.lang = 'ko-KR'; // 한국어 인식

      recognition.onstart = () => {
        isRecognizing = true;
        voiceBtn.textContent = '음성으로 인식중..';
        voiceBtn.style.animation = 'pulse 1.5s infinite';
        
        // 기존에 입력된 텍스트를 유지하고 이어서 작성
        finalTranscript = diaryInput.value;
        if (finalTranscript.length > 0 && !finalTranscript.endsWith(' ') && !finalTranscript.endsWith('\n')) {
          finalTranscript += ' ';
        }
      };

      recognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript + ' ';
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }
        diaryInput.value = finalTranscript + interimTranscript;
      };

      recognition.onerror = (event) => {
        console.error('음성 인식 오류:', event.error);
        stopRecognition();
      };

      recognition.onend = () => {
        stopRecognition();
      };

      function stopRecognition() {
        isRecognizing = false;
        voiceBtn.textContent = '음성으로 입력하기';
        voiceBtn.style.animation = 'none';
      }

      voiceBtn.addEventListener('click', () => {
        if (isRecognizing) {
          recognition.stop();
        } else {
          try {
            recognition.start();
          } catch(e) {
            console.error(e);
          }
        }
      });
    } else {
      voiceBtn.addEventListener('click', () => {
        alert('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome 또는 Edge 브라우저를 이용해주세요.');
      });
    }

    // AI API 연동 (Vercel 배포 시 /api/gemini, 로컬 시 .env 직접 읽기)
    const submitBtn = document.getElementById('submitBtn');
    const aiResponseBox = document.getElementById('aiResponseBox');

    // Gemini API를 Vercel 백엔드(/api/gemini)를 통해 호출
    async function callViaVercel(text) {
      const response = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || '서버 오류');
      return data.reply;
    }

    // Gemini API를 .env에서 키를 읽어 직접 호출 (로컬용)
    async function callViaEnv(text) {
      const envResponse = await fetch('.env');
      if (!envResponse.ok) throw new Error('.env 파일을 읽을 수 없습니다.');
      const envText = await envResponse.text();
      const apiKeyLine = envText.split('\n').find(line => line.startsWith('GEMINI_API_KEY='));
      if (!apiKeyLine) throw new Error('GEMINI_API_KEY가 .env 파일에 없습니다.');
      const apiKey = apiKeyLine.split('=')[1].trim();

      const systemPrompt = "너는 심리상담가야. 사용자가 작성한 일기내용을 읽고, 따뜻한 응원의 메시지를 2~3문장으로 작성해줘. 답변 형식은 반드시 '감정:[요약된감정]\\n\\n[응원메시지]' 와 같이 줄바꿈 해서 보여줘.";
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: "user", parts: [{ text: `[System Instruction: ${systemPrompt}]\n\n사용자 일기: ${text}` }] }],
          generationConfig: { temperature: 0.7 }
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || 'Gemini API 오류');
      return data.candidates?.[0]?.content?.parts?.[0]?.text || "답변을 생성할 수 없습니다.";
    }

    submitBtn.addEventListener('click', async () => {
      const text = diaryInput.value.trim();
      if (!text) {
        alert('오늘 하루에 대해 먼저 적어주세요!');
        diaryInput.focus();
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '분석중... ⏳';
      aiResponseBox.innerHTML = '<span style="color: #64748b;">AI가 열심히 생각하고 있어요...</span>';

      try {
        let aiText;
        try {
          // 1차: Vercel 백엔드(/api/gemini) 시도
          aiText = await callViaVercel(text);
        } catch (e) {
          // 2차: 로컬 .env 방식으로 폴백
          console.log('Vercel API 실패, 로컬 .env로 시도:', e.message);
          aiText = await callViaEnv(text);
        }
        aiResponseBox.innerHTML = aiText.replace(/\n\n/g, '<br><br>').replace(/\n/g, '<br>');
      } catch (error) {
        console.error('API Error:', error);
        aiResponseBox.innerHTML = `⚠️ AI 응답을 가져올 수 없습니다.<br>오류: ${error.message}`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '✨ 분석 요청하기';
      }
    });

  </script>
</body>
</html>
